name: deploy order

# main 브렌치의 코드 변경이 감지되면 아래 pipeline 동작 (trigger)
on:
  push:
    branches:
      - main

jobs:
  # job name
  build-and-deploy:
    # runner 
    runs-on: ubuntu-latest

    steps:
      - name: checkout github
        uses: actions/checkout@v2 

      - name: install kubectl
        uses: azure/setup-kubectl@v3

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ap-south-1

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-south-1 --name lgcns-wlguss-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      - name: image build and push docker image to ecr
        env: 
          REGISTRY: 933090817123.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: order-wlguss-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Dockerfile . 
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG