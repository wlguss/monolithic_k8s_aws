# docker ver. 
spring:
    datasource: # 연결할 DB 설정 
        driver-class-name: org.mariadb.jdbc.Driver  # MariaDB와 연결할 수 있는 드라이버 클래스 
        url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/inspire} # 로컬과 도커 환경 모두에서 사용 가능! 
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_USERNAME:1215}

    #redis
    data:
        redis:
            host: localhost
            port: 6379
            password: 
            timeout: 6000ms


    jpa:
        hibernate: 
            # create(-> 서버 기동 시점에 생성된 entity에 매핑되는 테이블 자동 생성), create-drop, update, none
            ddl-auto:  ${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
        # 콘솔출력
        show-sql: true     
        properties:
            hibernate:
                # h2
                # dialect: org.hibernate.dialect.H2Dialect
                # mariadb
                dialect: org.hibernate.dialect.MariaDBDialect
                format_sql: true

jwt:
    secret: wlguss-jihyun-springsecurity-key-test-forjwtprovider-134679
